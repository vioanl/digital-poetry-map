<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Digital Poetry Sound Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2b2b2b;
      color: #fff;
      overflow: hidden;
    }

    /* MAP FULLSCREEN */
    .map-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .map-container img {
      width: 100%;
      height: 100%;
      object-position: center 40%;
      display: block;
    }

    /* ─── TITLE OVERLAY ─────────────────────────────────── */
    .title-overlay {
      position: fixed;
      top: 0;
      left: 0;
      padding: 2.8rem 3.2rem;
      z-index: 10;
      pointer-events: none;

      /* soft vignette so text is legible over any background */
      background: radial-gradient(
        ellipse 70% 80% at 0% 0%,
        rgba(0, 0, 0, 0.55) 0%,
        transparent 100%
      );

      /* fade + slight upward drift on load */
      opacity: 0;
      transform: translateY(10px);
      animation: titleReveal 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    @keyframes titleReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* thin decorative rule above */
    .title-rule {
      width: 40px;
      height: 1px;
      background: rgba(255, 220, 80, 0.6);
      margin-bottom: 1.2rem;
    }

    .title-main {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.6rem, 3.2vw, 2.8rem);
      line-height: 1.15;
      letter-spacing: 0.01em;
      color: #ffd84a;
      margin: 0 0 0.6rem;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
      max-width: 480px;
    }

    .title-subtitle {
      font-family: "Cormorant SC", Georgia, serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 1vw, 0.78rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 216, 74, 0.7);
      margin: 0 0 1.6rem;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
    }

    /* thin rule between subtitle and author */
    .title-divider {
      width: 24px;
      height: 1px;
      background: rgba(255, 216, 74, 0.4);
      margin-bottom: 0.8rem;
    }

    .title-author {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 400;
      font-size: clamp(0.7rem, 1.1vw, 0.9rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 216, 74, 0.6);
      margin: 0;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
    }

    /* ─── HOTSPOTS ──────────────────────────────────────── */
    .hotspot {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #fff;
      background-color: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .hotspot::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
    }

    .hotspot:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
      background-color: rgba(255, 255, 255, 0.3);
    }

    /* INFO BUTTON */
    .info-button {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #fff;
      background-color: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      z-index: 20;
    }

    .info-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
      background-color: rgba(255, 255, 255, 0.2);
    }

    /* NOW PLAYING LABEL */
    #now-playing {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.6);
      font-size: 0.85rem;
      max-width: calc(100vw - 2rem);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="map-container">
    <img src="images/map.png" alt="Digital poetry sound map" />

    <button class="hotspot" style="top: 61%; left: 23%;" onclick="window.location.href='water.html'" data-title="Waypoint 1: Water"></button>
    <button class="hotspot" style="top: 54%; left: 32%;" onclick="window.location.href='wind.html'" data-title="Waypoint 2: Wind"></button>
    <button class="hotspot" style="top: 53%; left: 43%;" onclick="window.location.href='light.html'" data-title="Waypoint 3: Light"></button>
    <button class="hotspot" style="top: 55%; left: 54%;" onclick="window.location.href='texture.html'" data-title="Waypoint 4: Texture"></button>
    <button class="hotspot" style="top: 59%; left: 63%;" onclick="window.location.href='living.html'" data-title="Waypoint 5: Living Things"></button>
    <button class="hotspot" style="top: 58%; left: 73%;" onclick="window.location.href='voices.html'" data-title="Waypoint 6: Human Voices"></button>
    <button class="hotspot" style="top: 62%; left: 84%;" onclick="window.location.href='self.html'" data-title="Waypoint 7: Self-Recognition"></button>
  </div>

  <!-- ─── TITLE CARD ─────────────────────────────────────── -->
  <div class="title-overlay">
    <div class="title-rule"></div>
    <h1 class="title-main">A human forgets<br/>its first walk</h1>
    <p class="title-subtitle">Unit 33321 &nbsp;·&nbsp; a memory under the sun</p>
    <div class="title-divider"></div>
    <p class="title-author">Valsamara Ioanna</p>
  </div>

  <!-- Info button -->
  <button class="info-button" onclick="window.location.href='about.html'">i</button>

  <div id="now-playing">Click a point on the path to listen.</div>

  <audio id="player"></audio>

  <script>
    const hotspots = document.querySelectorAll(".hotspot");
    const player = document.getElementById("player");
    const nowPlaying = document.getElementById("now-playing");

    hotspots.forEach((spot) => {
      spot.addEventListener("click", () => {
        const src = spot.dataset.audio;
        const title = spot.dataset.title || "Untitled poem";

        if (player.src.includes(src) && !player.paused) {
          player.pause();
          nowPlaying.textContent = "Paused: " + title;
        } else {
          player.src = src;
          player.play();
          nowPlaying.textContent = "Now playing: " + title;
        }
      });
    });

    player.addEventListener("ended", () => {
      nowPlaying.textContent = "Click a point on the path to listen.";
    });
  </script>
</body>
</html>
